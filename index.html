    <title>CinemaDiscovery — The Ultimate Movie & TV Database</title>
    <meta name="description" content="Discover Every Story Ever Told"/>
    <meta name="keywords" content="movie database, film ratings, tv shows, streaming guide, movie trailers, IMDb alternative, best movies, top rated films, movie reviews, watch movies"/>
    <meta name="robots" content="index, follow"/>
    <meta name="googlebot" content="index, follow"/>
    <link rel="canonical" href="https://cinemadiscovery.com"/>

    <!-- Open Graph tags for social sharing -->
    <meta property="og:type" content="website"/>
    <meta property="og:url" content="https://cinemadiscovery.com"/>
    <meta property="og:title" content="CinemaDiscovery — The Ultimate Movie & TV Database"/>

    <meta property="og:image" content="https://cinemadiscovery.com/og-image.jpg" />
    <meta property="og:site_name" content="CinemaDiscovery"/>

    <!-- Twitter Card tags -->
    <meta name="twitter:card" content="summary_large_image"/>
    <meta name="twitter:site" content="@cinemadiscovery"/>
    <meta name="twitter:title" content="CinemaDiscovery"/>
    <meta name="twitter:description" content="The Ultimate Movie & TV Database"/>

    <!-- Google Search Console -->
    <meta name="google-site-verification" content="CODE_PLACEHOLDER"/>
    
    <!-- GA4 Analytics Snippet -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PLACEHOLDER"></script>

      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-PLACEHOLDER');
    </script>
    
    <!-- Website Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "CinemaDiscovery",
      "url": "https://cinemadiscovery.com",
      "description": "The Ultimate Movie & TV Database",
      "potentialAction": {
        "@type": "SearchAction",

        "query-input": "required name=query"

    }
    </script>
