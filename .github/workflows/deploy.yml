name: Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install Dependencies
        run: npm install
        
      - name: Build Project
        run: npm run build
        env:
          VITE_TMDB_API_KEY: placeholder
          VITE_TMDB_READ_TOKEN: placeholder
          VITE_FIREBASE_API_KEY: placeholder
          VITE_FIREBASE_AUTH_DOMAIN: placeholder
          VITE_FIREBASE_PROJECT_ID: placeholder
          VITE_FIREBASE_STORAGE_BUCKET: placeholder
          VITE_FIREBASE_MESSAGING_SENDER_ID: placeholder
          VITE_FIREBASE_APP_ID: placeholder
        
      - name: Confirm Build Success
        run: echo "Build completed successfully!"
